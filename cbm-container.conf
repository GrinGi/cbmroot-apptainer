# ====== PATHS ======
INSTALL_BASE=/opt/cbm
CBMROOT_SRC=/opt/cbm/src/cbmroot

# ====== BUILD MODE ======
AUTO_INSTALL=yes        # yes|no — perform installation during image build
BUILD_JOBS=16           # number of parallel build jobs

# ====== COMPONENT SELECTION ======
INSTALL_FAIRSOFT=1      # 1/0 -> include/exclude FairSoft (-fs)
INSTALL_FAIRROOT=1      # 1/0 -> include/exclude FairRoot (-fr)
INSTALL_CBMROOT=1       # 1/0 -> include/exclude CbmRoot (-cr)

# ====== STACK SELECTION ======
# Exactly one of the following should be set to 1; if all are 0, PRO is used.
USE_PRO=1               # -> -p (PRO stack)
USE_DEV=0               # -> -d (DEV stack)
USE_OLD=0               # -> -o (OLD stack)

# ====== CUSTOM SOFTWARE VERSIONS ======
# If SPEC_FSOFR_FROOT=1, these values override default versions
# in autoinstall_framework.sh.
SPEC_FSOFR_FROOT=0
ROOTVER=6
FSOFTVER=apr21p2
FROOTVER=v18.2.1

# If SPEC_CBMROOT_VER=1, checkout CBMROOT at the version/branch below.
SPEC_CBMROOT_VER=0
CBMROOT_VER=master

# ====== EXTERNAL INSTALLATIONS ======
# Example: use prebuilt FairSoft/FairRoot installations and build only CbmRoot.
#EXTERNAL_FAIRSOFT=/cvmfs/fairsoft.gsi.de/debian11/fairsoft/nov22p3
#EXTERNAL_FAIRROOT=/cvmfs/fairsoft.gsi.de/debian11/fairroot/v18.8.0_nov22p3

# ====== EXTRA FLAGS FOR autoinstall_framework.sh (OPTIONAL) ======
# If defined, these will be appended to the final flag list.
#EXTRA_FLAGS="--yes"

